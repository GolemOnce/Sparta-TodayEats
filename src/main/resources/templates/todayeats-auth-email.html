<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘한끼 인증 안내</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f7f9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 520px;
            margin: 40px auto;
            padding: 24px;
            background-color: #ffffff;
            border-radius: 12px;
            border: 1px solid #e5e5e5;
            text-align: center;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #ff6b35;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 18px;
            color: #333;
        }

        p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .code-box {
            font-size: 26px;
            font-weight: bold;
            color: #ff6b35;
            background-color: #fff3ee;
            padding: 14px;
            border-radius: 8px;
            display: inline-block;
            margin: 20px 0;
            letter-spacing: 3px;
        }

        .button {
            display: inline-block;
            padding: 12px 18px;
            margin-top: 15px;
            background-color: #ff6b35;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #aaa;
        }
    </style>

</head>

<body>
<div class="container">

    <div class="logo">오늘한끼</div>

    <h2 th:text="${title}">메일 제목</h2>

    <p th:text="${description}">메일 상세 설명</p>

    <!-- 인증번호 -->
    <div th:if="${code != null}" class="code-box" th:text="${code}">인증번호</div>

    <!-- 비밀번호 재설정 링크 -->
    <a th:if="${resetLink != null}" th:href="${resetLink}" class="button">비밀번호 재설정</a>

    <p class="footer">
        이 인증 정보는 <strong>5분</strong> 동안 유효합니다.<br/>
        본인이 요청하지 않은 경우 이 메일을 무시해주세요.
    </p>

    <p class="footer">
        문의: support@todayeats.com
    </p>

</div>
</body>
</html>
